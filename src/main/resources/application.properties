# ============================================================
# AI Proxy Platform — Configuración de la aplicación
# ============================================================
# Todas las URLs y valores sensibles se configuran mediante
# variables de entorno para evitar valores quemados en el código.
# ============================================================

# Puerto del servidor
# Railway inyecta PORT automáticamente en producción
server.port=${PORT:8080}

spring.application.name=ai-proxy-backend

# ============================================================
# CORS
# Desarrollo:  http://localhost:5173,http://localhost:3000
# Producción:  configurar CORS_ALLOWED_ORIGINS en Railway
#              con la URL real de Vercel
# ============================================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ============================================================
# Serialización JSON
# ============================================================
# Fechas como strings ISO-8601, no como timestamps numéricos
spring.jackson.serialization.write-dates-as-timestamps=false
# Omite campos nulos en las respuestas JSON
spring.jackson.default-property-inclusion=non_null

# ============================================================
# Logs
# ============================================================
logging.level.com.aiplatform=INFO
logging.level.com.aiplatform.service.proxy=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.springframework.scheduling=WARN

# ============================================================
# Servidor web
# ============================================================
# Timeout de 15s: cubre el delay simulado de 1.2s con margen amplio
spring.mvc.async.request-timeout=15000
